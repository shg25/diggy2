<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="data:," />
		<title>JIB-FREAK MOBILE</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				/* ゲーム画面なのでスクロール等のジェスチャを全て無効化。
				   manipulation ではパン(スクロール)が残り、実機のChromeが
				   ドラッグ操作を乗っ取って pointercancel してしまう */
				touch-action: none;
				overscroll-behavior: none;
			}
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				background: #000;
			}
			canvas {
				image-rendering: pixelated;
				touch-action: none;
			}
		</style>
	</head>
	<body>
		<div id="screen"></div>
		<script type="module" src="js/main.js"></script>
	</body>
</html>
